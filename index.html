<title>Saiba Hair Salon & Spa — Coming Soon</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --forest: #022111;
    --gold: #ce9644;
    --gold-light: #e8b96a;
    --cream: #f8f5f0;
  }
  html, body {
    height: 100%;
    background: var(--forest);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
    overflow: hidden;
    position: relative;
  }

  /* Ambient glow */
  body::before {
    content: '';
    position: absolute;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(206,150,68,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo {
    width: min(320px, 75vw);
    margin-bottom: 3rem;
    animation: fadeDown 1.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  .divider {
    width: 2.5rem;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 2rem;
    animation: fadeIn 1.2s 0.4s cubic-bezier(0.22,1,0.36,1) both;
  }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    color: rgba(255,255,255,0.75);
    margin-bottom: 1rem;
    animation: fadeIn 1.2s 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }

  .message {
    font-size: clamp(0.8rem, 2vw, 0.9rem);
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3rem;
    animation: fadeIn 1.2s 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* Countdown */
  .countdown {
    display: flex;
    gap: 2rem;
    margin-bottom: 3.5rem;
    animation: fadeIn 1.2s 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }
  .count-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }
  .count-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 6vw, 3.5rem);
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
    min-width: 2.5ch;
  }
  .count-label {
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }
  .count-sep {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    color: rgba(206,150,68,0.3);
    align-self: flex-start;
    padding-top: 0.25rem;
    line-height: 1;
  }

  .contact-line {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.06em;
    animation: fadeIn 1.2s 0.9s cubic-bezier(0.22,1,0.36,1) both;
  }
  .contact-line a {
    color: var(--gold);
    text-decoration: none;
    transition: color 0.2s;
  }
  .contact-line a:hover { color: var(--gold-light); }

  .location {
    margin-top: 0.6rem;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.08em;
    animation: fadeIn 1.2s 1s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* Gold border bottom accent */
  body::after {
    content: '';
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .countdown { gap: 1.2rem; }
    .count-sep { display: none; }
  }
</style>
</head>
